<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页概览 — OBE教管平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>



  

  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="page-header">
      <div>
        <h1 class="page-title">首页概览</h1>
        <p class="page-subtitle">OBE成果导向教育数据分析中心</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="sync-time" class="text-xs" style="color:var(--color-neutral-400)"></span>
        <button onclick="loadDashboard()" class="btn btn-secondary btn-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          刷新
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 page-enter" id="page-content">

      <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-6" id="stats-grid">
        <div class="skeleton h-24"></div><div class="skeleton h-24"></div>
        <div class="skeleton h-24"></div><div class="skeleton h-24"></div>
        <div class="skeleton h-24"></div><div class="skeleton h-24"></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-5">
        <div class="lg:col-span-2 card">
          <div class="card-header">
            <span class="card-title">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
              有效培养方案
            </span>
            <a href="/pages/curriculum.html" class="btn btn-ghost btn-sm">查看全部</a>
          </div>
          <div class="card-body" id="versions-list">
            <div class="space-y-2">
              <div class="skeleton h-14"></div>
              <div class="skeleton h-14"></div>
              <div class="skeleton h-14"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              快速入口
            </span>
          </div>
          <div class="card-body">
            <div id="quick-actions" class="grid grid-cols-2 gap-2"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            OBE逻辑链路
          </span>
        </div>
        <div class="card-body">
          <div id="obe-flow" class="flex items-center w-full"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/index.js"></script>
</body>
</html>
