<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程管理 — OBE教管平台</title>
  <script src="../libs/tailwind.js"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>
  <main class="flex-1 flex flex-col overflow-hidden">

    <header class="page-header">
      <div>
        <h1 class="page-title">课程管理</h1>
        <p class="page-subtitle">管理培养方案中的课程体系设置</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="version-select" onchange="loadCourses()" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px;min-width:200px">
          <option value="">选择培养方案版本…</option>
        </select>
        <button onclick="openCreateModal()" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加课程
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 page-enter">

      <!-- Semester filter + stats -->
      <div class="flex items-center gap-3 mb-5">
        <div class="tab-group">
          <button class="tab-item active" onclick="filterSemester(null, this)">全部</button>
          <button class="tab-item" onclick="filterSemester(1, this)">第1学期</button>
          <button class="tab-item" onclick="filterSemester(2, this)">第2学期</button>
          <button class="tab-item" onclick="filterSemester(3, this)">第3学期</button>
          <button class="tab-item" onclick="filterSemester(4, this)">第4学期</button>
          <button class="tab-item" onclick="filterSemester(5, this)">第5学期</button>
          <button class="tab-item" onclick="filterSemester(6, this)">第6学期</button>
        </div>
        <div id="summary-pills" class="hidden flex items-center gap-3 ml-auto">
          <span class="badge badge-neutral" id="sum-count"></span>
          <span class="badge badge-primary" id="sum-credits"></span>
          <span class="badge badge-info" id="sum-hours"></span>
          <span class="badge badge-warning" id="sum-core"></span>
        </div>
      </div>

      <!-- Table card -->
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>课程编号</th>
                <th>课程名称</th>
                <th class="text-center">学分</th>
                <th class="text-center">总学时</th>
                <th class="text-center">理论/实践</th>
                <th class="text-center">性质</th>
                <th class="text-center">学期</th>
                <th class="text-center">核心课</th>
                <th class="text-right">操作</th>
              </tr>
            </thead>
            <tbody id="courses-tbody">
              <tr><td colspan="9">
                <div class="empty-state">
                  <div class="empty-state-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></div>
                  <p class="empty-state-title">请先选择培养方案版本</p>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/courses.js"></script>

</body>
</html>
