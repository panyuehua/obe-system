<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支撑矩阵 — OBE教管平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    .matrix-wrap { overflow: auto; }
    .matrix-table { border-collapse: separate; border-spacing: 3px; }
    .matrix-table th { position: sticky; background: var(--color-surface); z-index: 2; }
    .matrix-table thead th { top: 0; }
    .matrix-table tbody th { left: 0; z-index: 3; }
    .matrix-table thead th:first-child { left: 0; z-index: 4; }
    .ind-header { max-width: 120px; writing-mode: vertical-rl; text-orientation: mixed; padding: 8px 4px !important; height: 100px; white-space: nowrap; }
    .cell-btn { width: 36px; height: 36px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; transition: transform 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; }
    .cell-btn:hover { transform: scale(1.1); opacity: 0.85; }
    .cell-btn.H    { background: var(--color-primary-600); color: #fff; }
    .cell-btn.M    { background: var(--color-primary-200); color: var(--color-primary-700); }
    .cell-btn.L    { background: var(--color-primary-50);  color: var(--color-primary-500); }
    .cell-btn.none { background: var(--color-neutral-100); color: var(--color-neutral-300); }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>
  <main class="flex-1 flex flex-col overflow-hidden">

    <header class="page-header">
      <div>
        <h1 class="page-title">支撑矩阵</h1>
        <p class="page-subtitle">配置指标点与课程之间的支撑关系权重</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="version-select" onchange="loadMatrix()" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px;min-width:220px">
          <option value="">选择培养方案版本</option>
        </select>
        <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg" style="background:var(--color-neutral-100);font-size:12px">
          <span class="cell-btn H" style="width:20px;height:20px;font-size:9px;border-radius:4px">H</span><span style="color:var(--color-neutral-600)">高</span>
          <span class="cell-btn M" style="width:20px;height:20px;font-size:9px;border-radius:4px;margin-left:8px">M</span><span style="color:var(--color-neutral-600)">中</span>
          <span class="cell-btn L" style="width:20px;height:20px;font-size:9px;border-radius:4px;margin-left:8px">L</span><span style="color:var(--color-neutral-600)">低</span>
          <span class="cell-btn none" style="width:20px;height:20px;font-size:9px;border-radius:4px;margin-left:8px">无</span><span style="color:var(--color-neutral-600)">无</span>
        </div>
      </div>
    </header>

    <div class="flex-1 overflow-hidden flex flex-col p-6 gap-4 page-enter">

      <!-- Info bar -->
      <div id="info-bar" class="hidden flex items-center gap-4 px-4 py-3 rounded-xl" style="background:var(--color-primary-50);border:1px solid var(--color-primary-100)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <p style="font-size:13px;color:var(--color-primary-700)">点击单元格循环切换支撑强度：<strong>无 → H（强）→ M（中）→ L（弱）→ 无</strong>，权重值可在弹窗中精确设置。更改实时保存。</p>
      </div>

      <!-- Matrix card -->
      <div class="card flex-1 overflow-hidden flex flex-col">
        <div class="card-header flex-shrink-0">
          <span class="card-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
            指标点 × 课程 支撑矩阵
          </span>
          <div id="matrix-stats" class="flex items-center gap-2"></div>
        </div>
        <div id="matrix-body" class="flex-1 overflow-auto p-4">
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
            </div>
            <p class="empty-state-title">请选择培养方案版本</p>
            <p class="empty-state-desc">选择后将自动生成支撑关系配置矩阵</p>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  nav.render('matrix');

  let matrixData = { indicators: [], courses: [], relations: [] };
  const strengthCycle = [null, 'H', 'M', 'L'];
  const strengthWeight = { H: 1.0, M: 0.6, L: 0.3 };

  async function initVersionSelect() {
    const majors = await api.majors.list();
    const sel = document.getElementById('version-select');
    for (const m of majors) {
      const vs = await api.curriculum.versions(m.id);
      vs.forEach(v => {
        const o = document.createElement('option');
        o.value = v.id;
        o.textContent = `${m.name} · ${v.grade_year}级`;
        sel.appendChild(o);
      });
    }
  }

  async function loadMatrix() {
    const vId = document.getElementById('version-select').value;
    if (!vId) return;
    try {
      matrixData = await api.curriculum.supportMatrix(vId);
      renderMatrix();
      document.getElementById('info-bar').classList.remove('hidden');
    } catch(e) { toast.error(e.message); }
  }

  function getRelation(indId, courseId) {
    return matrixData.relations.find(r => r.indicator_id == indId && r.course_id == courseId);
  }

  function getStrength(indId, courseId) {
    const rel = getRelation(indId, courseId);
    if (!rel) return null;
    if (rel.weight >= 0.9) return 'H';
    if (rel.weight >= 0.5) return 'M';
    return 'L';
  }

  function renderMatrix() {
    const { indicators, courses } = matrixData;
    const body = document.getElementById('matrix-body');

    if (!indicators.length || !courses.length) {
      body.innerHTML = `<div class="empty-state"><div class="empty-state-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></div><p class="empty-state-title">数据不足</p><p class="empty-state-desc">请先完善培养方案中的指标点和课程信息</p></div>`;
      return;
    }

    // Stats
    const total = indicators.length * courses.length;
    const filled = matrixData.relations.length;
    document.getElementById('matrix-stats').innerHTML = `
      <span class="badge badge-neutral">${indicators.length} 个指标点</span>
      <span class="badge badge-neutral">${courses.length} 门课程</span>
      <span class="badge badge-primary">已配置 ${filled} / ${total}</span>
    `;

    // Group indicators by GR
    const grGroups = {};
    indicators.forEach(ind => {
      const grCode = ind.gr_code || ind.code.split('.')[0];
      if (!grGroups[grCode]) grGroups[grCode] = [];
      grGroups[grCode].push(ind);
    });

    body.innerHTML = `
      <div class="matrix-wrap">
        <table class="matrix-table">
          <thead>
            <tr>
              <th style="min-width:120px;padding:8px 12px;text-align:left;font-size:11px;color:var(--color-neutral-500)">指标点 \\ 课程</th>
              ${courses.map(c => `
                <th class="ind-header" style="font-size:11px;font-weight:600;color:var(--color-neutral-600)" title="${c.name}">
                  <span>${c.code}</span>
                </th>
              `).join('')}
            </tr>
          </thead>
          <tbody>
            ${Object.entries(grGroups).map(([grCode, inds]) => `
              <tr>
                <td colspan="${courses.length + 1}" style="padding:6px 8px 2px;font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--color-primary-500);background:var(--color-primary-50)">
                  ${grCode}
                </td>
              </tr>
              ${inds.map(ind => `
                <tr>
                  <th style="padding:4px 12px;font-size:12px;color:var(--color-neutral-700);font-weight:500;text-align:left;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis" title="${ind.description || ''}">
                    <span style="color:var(--color-primary-500);font-weight:700;margin-right:4px">${ind.code}</span>
                    <span style="color:var(--color-neutral-500);font-size:11px">${(ind.description || '').slice(0,18)}${(ind.description || '').length > 18 ? '…' : ''}</span>
                  </th>
                  ${courses.map(c => {
                    const strength = getStrength(ind.id, c.id);
                    const rel = getRelation(ind.id, c.id);
                    return `
                      <td style="padding:2px;text-align:center">
                        <button class="cell-btn ${strength || 'none'}"
                          onclick="cycleCell(${ind.id}, ${c.id}, this)"
                          data-ind="${ind.id}" data-course="${c.id}"
                          data-tooltip="${c.name}: ${rel ? '权重 ' + rel.weight : '未关联'}"
                          aria-label="${ind.code} × ${c.code}">
                          ${strength || '无'}
                        </button>
                      </td>`;
                  }).join('')}
                </tr>
              `).join('')}
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function cycleCell(indId, courseId, btn) {
    const current = btn.textContent.trim();
    const currentStrength = current === '无' ? null : current;
    const idx = strengthCycle.indexOf(currentStrength);
    const nextStrength = strengthCycle[(idx + 1) % strengthCycle.length];

    // Optimistic update
    btn.className = `cell-btn ${nextStrength || 'none'}`;
    btn.textContent = nextStrength || '无';

    try {
      if (!nextStrength) {
        await api.curriculum.removeSupport({ indicator_id: indId, course_id: courseId });
        matrixData.relations = matrixData.relations.filter(r => !(r.indicator_id == indId && r.course_id == courseId));
      } else {
        const weight = strengthWeight[nextStrength];
        await api.curriculum.saveSupport({ indicator_id: indId, course_id: courseId, weight });
        const existing = matrixData.relations.find(r => r.indicator_id == indId && r.course_id == courseId);
        if (existing) existing.weight = weight;
        else matrixData.relations.push({ indicator_id: indId, course_id: courseId, weight });
      }

      // Update stats
      const filled = matrixData.relations.length;
      const total = matrixData.indicators.length * matrixData.courses.length;
      document.querySelector('#matrix-stats .badge-primary').textContent = `已配置 ${filled} / ${total}`;
      // Update tooltip
      btn.setAttribute('data-tooltip', nextStrength ? `权重 ${strengthWeight[nextStrength]}` : '未关联');
    } catch(e) {
      toast.error('保存失败：' + e.message);
      // Revert
      btn.className = `cell-btn ${currentStrength || 'none'}`;
      btn.textContent = currentStrength || '无';
    }
  }

  initVersionSelect();
</script>
</body>
</html>
