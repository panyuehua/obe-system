<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>培养方案 — OBE教管平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    /* ─── 标签页 ─── */
    .tab-btn {
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-neutral-500);
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--color-neutral-800); }
    .tab-btn.active {
      color: var(--color-primary-600);
      border-bottom-color: var(--color-primary-600);
      font-weight: 600;
    }

    /* ─── 矩阵通用 ─── */
    .matrix-outer { overflow: auto; }
    .matrix-tbl { border-collapse: collapse; }
    .matrix-tbl th {
      position: sticky;
      background: var(--color-surface);
      z-index: 2;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-neutral-600);
    }
    .matrix-tbl thead th { top: 0; border-bottom: 1px solid var(--color-border-subtle); padding: 0 4px 6px; }
    .matrix-tbl tbody th { left: 0; z-index: 3; text-align: left; }
    .matrix-tbl thead th:first-child { left: 0; z-index: 4; }
    .vtxt {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      white-space: nowrap;
      height: 90px;
      padding: 8px 6px !important;
      font-size: 11px;
    }
    .mcell {
      width: 38px; height: 38px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      transition: transform 0.1s, background 0.15s;
      font-size: 15px; font-weight: 700;
      display: table-cell;
      text-align: center; vertical-align: middle;
    }
    .mcell:hover { transform: scale(1.15); }
    .mcell.on  { background: var(--color-primary-600); color: #fff; }
    .mcell.off { background: var(--color-neutral-100); color: transparent; }
    .mcell.off:hover { background: var(--color-primary-100); }
    .matrix-tbl td { padding: 3px; }
    .matrix-tbl tbody th {
      padding: 4px 16px 4px 0;
      min-width: 140px;
      max-width: 220px;
      border-bottom: 1px solid var(--color-border-subtle);
    }
    .matrix-tbl tbody tr:last-child th { border-bottom: none; }

    /* ─── GR 分组表头 ─── */
    .gr-group-th {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--color-primary-700);
      background: var(--color-primary-50) !important;
      border-radius: 4px;
      padding: 3px 4px !important;
    }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- ═══ 列表视图 Header ═══ -->
    <header id="header-list" class="page-header">
      <div>
        <h1 class="page-title">培养方案管理</h1>
        <p class="page-subtitle">管理各专业不同届次的培养方案版本</p>
      </div>
      <button onclick="openCreateVersionModal()" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建培养方案
      </button>
    </header>

    <!-- ═══ 详情视图 Header ═══ -->
    <header id="header-detail" class="page-header hidden">
      <div class="flex items-center gap-3">
        <button onclick="showList()" class="btn btn-ghost btn-sm btn-icon" aria-label="返回列表" title="返回列表">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div>
          <div class="flex items-center gap-2 flex-wrap">
            <h1 class="page-title" id="detail-title" style="margin:0"></h1>
            <span id="detail-version-badge" class="badge badge-primary"></span>
            <span id="detail-status-badge" class="badge"></span>
          </div>
          <p class="page-subtitle" id="detail-subtitle" style="margin-top:2px"></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-toggle-status" onclick="toggleVersionStatus()" class="btn btn-secondary btn-sm"></button>
        <button onclick="openCreateRevisionModal()" class="btn btn-secondary btn-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          新建修订版
        </button>
      </div>
    </header>

    <!-- ═══ 列表视图 ═══ -->
    <div id="view-list" class="flex-1 overflow-y-auto p-6 page-enter">
      <div class="flex flex-nowrap items-center gap-3 mb-5 min-w-0 w-full overflow-x-auto pb-0.5">
        <div class="relative flex-1 min-w-[140px] max-w-md">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-neutral-400)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search-input" type="search" placeholder="搜索专业名称…" oninput="filterVersions()"
            class="form-input pl-8" style="min-height:40px;padding-top:8px;padding-bottom:8px" />
        </div>
        <div class="w-44 flex-shrink-0">
          <select id="filter-major" onchange="filterVersions()" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px">
            <option value="">全部专业</option>
          </select>
        </div>
        <div class="w-36 flex-shrink-0">
          <select id="filter-status" onchange="filterVersions()" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px">
            <option value="">全部状态</option>
            <option value="active">有效</option>
            <option value="draft">草稿</option>
          </select>
        </div>
        <span id="count-label" class="text-xs ml-auto flex-shrink-0 whitespace-nowrap" style="color:var(--color-neutral-400)"></span>
      </div>
      <div id="versions-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div class="skeleton h-48 rounded-2xl"></div>
        <div class="skeleton h-48 rounded-2xl"></div>
        <div class="skeleton h-48 rounded-2xl"></div>
      </div>
    </div>

    <!-- ═══ 详情视图（标签布局） ═══ -->
    <div id="view-detail" class="hidden flex-1 flex flex-col overflow-hidden">

      <!-- 统计条 -->
      <div id="stats-bar" class="px-6 pt-4 grid grid-cols-2 md:grid-cols-4 gap-3 flex-shrink-0"></div>

      <!-- 标签栏 -->
      <div class="flex-shrink-0 px-6 mt-4 flex gap-0 border-b" style="border-color:var(--color-border-subtle)">
        <button class="tab-btn active" id="tab-btn-objectives" onclick="switchTab('objectives')">培养目标</button>
        <button class="tab-btn" id="tab-btn-gr" onclick="switchTab('gr')">毕业要求</button>
        <button class="tab-btn" id="tab-btn-grs" onclick="switchTab('grs')">毕业指标点</button>
        <button class="tab-btn" id="tab-btn-obj-gr" onclick="switchTab('obj-gr')">目标-要求矩阵</button>
        <button class="tab-btn" id="tab-btn-matrix" onclick="switchTab('matrix')">毕业要求实现矩阵</button>
      </div>

      <!-- 可滚动标签内容 -->
      <div class="flex-1 overflow-auto p-6">

        <!-- ─── Tab: 培养目标 ─── -->
        <div id="tab-objectives">
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                培养目标
              </span>
              <button onclick="addObjective()" class="btn btn-primary btn-sm">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加目标
              </button>
            </div>
            <div id="objectives-list" class="card-body space-y-2"></div>
          </div>
        </div>

        <!-- ─── Tab: 毕业要求 ─── -->
        <div id="tab-gr" class="hidden">
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                毕业要求
              </span>
              <div class="flex items-center gap-2">
                <span id="gr-only-health" class="badge badge-neutral"></span>
                <button onclick="addGR()" class="btn btn-primary btn-sm">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  添加毕业要求
                </button>
              </div>
            </div>
            <div id="gr-only-list" class="card-body space-y-2"></div>
          </div>
        </div>

        <!-- ─── Tab: 毕业指标点 ─── -->
        <div id="tab-grs" class="hidden">
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                毕业指标点
              </span>
              <div class="flex items-center gap-2">
                <span id="gr-health" class="badge badge-neutral"></span>
              </div>
            </div>
            <div id="gr-list" class="divide-y" style="border-top:1px solid var(--color-border-subtle)"></div>
          </div>
        </div>

        <!-- ─── Tab: 目标-要求矩阵 ─── -->
        <div id="tab-obj-gr" class="hidden">
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                培养目标 ↔ 毕业要求 支撑矩阵（表1）
              </span>
              <p style="font-size:12px;color:var(--color-neutral-400)">点击格子切换是否支撑，自动保存</p>
            </div>
            <div class="card-body">
              <div id="obj-gr-matrix-wrap">
                <div class="empty-state" style="padding:32px 0">
                  <p class="empty-state-title">加载中…</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ─── Tab: 毕业要求实现矩阵 ─── -->
        <div id="tab-matrix" class="hidden">
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                毕业要求实现矩阵（附表）
              </span>
              <p style="font-size:12px;color:var(--color-neutral-400)">课程 × 指标点，点击格子切换支撑关系</p>
            </div>
            <div class="card-body">
              <div id="sic-matrix-wrap">
                <div class="empty-state" style="padding:32px 0">
                  <p class="empty-state-title">加载中…</p>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /tab content -->
    </div><!-- /view-detail -->

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════ -->

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/curriculum.js"></script>

</body>
</html>
