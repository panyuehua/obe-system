<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>持续改进 —OBE教管平台</title>
  <script src="../libs/tailwind.js"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>
  <main class="flex-1 flex flex-col overflow-hidden">

    <header class="page-header">
      <div>
        <h1 class="page-title">持续改进</h1>
        <p class="page-subtitle">追踪 CQI 改进计划，推动教学质量闭环提</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="version-select" onchange="loadPlans()" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px;min-width:220px">
          <option value="">选择培养方案版本</option>
        </select>
        <button onclick="openCreateModal()" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建改进计划
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 page-enter">

      <!-- CQI loop banner -->
      <div id="cqi-banner" class="hidden mb-5 px-5 py-4 rounded-xl" style="background:linear-gradient(135deg,var(--color-primary-600),#7c3aed);color:#fff">
        <div class="flex items-center justify-between">
          <div>
            <p style="font-size:13px;font-weight:700;letter-spacing:0.04em;opacity:0.85;margin-bottom:4px">CQI 闭环状</p>
            <p id="banner-text" style="font-size:22px;font-weight:800"></p>
          </div>
          <div class="flex items-center gap-6">
            <div class="text-center">
              <p id="cnt-pending"   style="font-size:24px;font-weight:800">—</p>
              <p style="font-size:11px;opacity:0.75">待启</p>
            </div>
            <div class="text-center">
              <p id="cnt-progress"  style="font-size:24px;font-weight:800">—</p>
              <p style="font-size:11px;opacity:0.75">进行</p>
            </div>
            <div class="text-center">
              <p id="cnt-completed" style="font-size:24px;font-weight:800">—</p>
              <p style="font-size:11px;opacity:0.75">已完</p>
            </div>
            <div class="text-center">
              <p id="cnt-verified"  style="font-size:24px;font-weight:800">—</p>
              <p style="font-size:11px;opacity:0.75">已验</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Status filter tabs -->
      <div class="flex items-center gap-3 mb-5">
        <div class="tab-group">
          <button class="tab-item active" onclick="filterStatus(null, this)">全部</button>
          <button class="tab-item" onclick="filterStatus('pending', this)">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;margin-right:4px;vertical-align:middle"></span>待启</button>
          <button class="tab-item" onclick="filterStatus('in_progress', this)">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--color-primary-500);margin-right:4px;vertical-align:middle"></span>进行</button>
          <button class="tab-item" onclick="filterStatus('completed', this)">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#10b981;margin-right:4px;vertical-align:middle"></span>已完</button>
          <button class="tab-item" onclick="filterStatus('verified', this)">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#6366f1;margin-right:4px;vertical-align:middle"></span>已验</button>
        </div>
        <div id="filter-count" class="ml-auto" style="font-size:12px;color:var(--color-neutral-400)"></div>
      </div>

      <!-- Plans grid -->
      <div id="plans-grid" class="grid gap-4" style="grid-template-columns:repeat(auto-fill,minmax(340px,1fr))">
        <div class="card" style="grid-column:1/-1">
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            </div>
            <p class="empty-state-title">请先选择培养方案版本</p>
            <p class="empty-state-desc">选择后将显示该版本的改进计划列表</p>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Status transition modal (inline) -->
<div id="status-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="status-modal-title">
  <div class="modal-dialog" style="max-width:440px">
    <div class="modal-header">
      <h3 class="modal-title" id="status-modal-title">更新进度</h3>
      <button onclick="closeStatusModal()" class="btn btn-ghost btn-icon btn-sm" aria-label="关闭">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" style="padding:20px">
      <p style="font-size:13px;color:var(--color-neutral-600);margin-bottom:16px">选择改进计划的当前状态：</p>
      <div id="status-options" class="grid gap-2" style="grid-template-columns:1fr 1fr"></div>
      <div style="margin-top:16px">
        <label class="form-label">备注（可选）</label>
        <textarea id="status-note" class="form-textarea" rows="3" placeholder="记录本次状态变更的说明"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeStatusModal()" class="btn btn-secondary">取消</button>
      <button onclick="confirmStatusUpdate()" class="btn btn-primary" id="status-confirm-btn">确认更新</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/improvement.js"></script>

</body>
</html>
