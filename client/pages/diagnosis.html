<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>诊断报告 — OBE教管平台</title>
  <script src="../libs/tailwind.js"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    .issue-card { border-radius: var(--radius-lg); border: 1px solid; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
    .issue-card.error   { background: #fef2f2; border-color: #fecaca; }
    .issue-card.warning { background: #fffbeb; border-color: #fde68a; }
    .issue-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .issue-icon.error   { background: #fee2e2; color: #b91c1c; }
    .issue-icon.warning { background: #fef3c7; color: #92400e; }
    .rule-item.error    { background: #fef2f2; border: 1px solid #fecaca; }
    .rule-item.warning  { background: #fffbeb; border: 1px solid #fde68a; }
    .rule-item.error   .rule-label { font-size: 12px; font-weight: 700; color: #991b1b; }
    .rule-item.warning .rule-label { font-size: 12px; font-weight: 700; color: #92400e; }
    .rule-item.error   .rule-desc  { font-size: 11px; color: #b91c1c; margin-top: 2px; line-height: 1.5; }
    .rule-item.warning .rule-desc  { font-size: 11px; color: #a16207; margin-top: 2px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>
  <main class="flex-1 flex flex-col overflow-hidden">

    <header class="page-header">
      <div>
        <h1 class="page-title">诊断报告</h1>
        <p class="page-subtitle">自动检测培养方案中的结构性逻辑问题</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="version-select" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px;min-width:220px">
          <option value="">选择培养方案版本</option>
        </select>
        <button id="btn-diagnose" onclick="runDiagnosis()" class="btn btn-primary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          运行诊断
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 page-enter">

      <div id="empty-state" class="card">
        <div class="empty-state">
          <div class="empty-state-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <p class="empty-state-title">选择培养方案后运行诊断</p>
          <p class="empty-state-desc">系统将自动扫描支撑孤岛、权重失衡、真空指标等5类结构性问题</p>
        </div>
      </div>

      <div id="results" class="hidden space-y-5">

        <div id="health-banner" class="flex items-center gap-4 rounded-2xl px-6 py-4"></div>

        <div class="grid grid-cols-3 gap-4" id="summary-cards"></div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              诊断规则说明
            </span>
          </div>
          <div class="card-body">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
              <div class="flex items-start gap-3 px-3 py-2.5 rounded-xl rule-item error">
                <div class="issue-icon error" style="width:28px;height:28px;flex-shrink:0;margin-top:1px">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </div>
                <div><p class="rule-label">支撑孤岛</p><p class="rule-desc">指标点无任何课程支撑，无法计算达成度</p></div>
              </div>
              <div class="flex items-start gap-3 px-3 py-2.5 rounded-xl rule-item error">
                <div class="issue-icon error" style="width:28px;height:28px;flex-shrink:0;margin-top:1px">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </div>
                <div><p class="rule-label">目标孤岛</p><p class="rule-desc">培养目标未关联任何毕业要求</p></div>
              </div>
              <div class="flex items-start gap-3 px-3 py-2.5 rounded-xl rule-item warning">
                <div class="issue-icon warning" style="width:28px;height:28px;flex-shrink:0;margin-top:1px">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div><p class="rule-label">无课程目标</p><p class="rule-desc">课程已开设但未配置ILO，无法采集达成数</p></div>
              </div>
              <div class="flex items-start gap-3 px-3 py-2.5 rounded-xl rule-item warning">
                <div class="issue-icon warning" style="width:28px;height:28px;flex-shrink:0;margin-top:1px">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div><p class="rule-label">支撑权重偏低</p><p class="rule-desc">指标点课程支撑总权重不足，建议≥0.5</p></div>
              </div>
              <div class="flex items-start gap-3 px-3 py-2.5 rounded-xl rule-item warning">
                <div class="issue-icon warning" style="width:28px;height:28px;flex-shrink:0;margin-top:1px">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div><p class="rule-label">权重求和异常</p><p class="rule-desc">二级指标点权重之和偏差≥0.05</p></div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              问题清单
            </span>
            <div class="flex items-center gap-2" id="issue-filter">
              <button class="tab-item active" onclick="filterIssues('all', this)" style="min-height:32px">全部</button>
              <button class="tab-item" onclick="filterIssues('error', this)" style="min-height:32px">错误</button>
              <button class="tab-item" onclick="filterIssues('warning', this)" style="min-height:32px">警告</button>
            </div>
          </div>
          <div id="issues-list" class="card-body space-y-3"></div>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/diagnosis.js"></script>

</body>
</html>
