<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>达成度分析 — OBE教管平台</title>
  <script src="../libs/tailwind.js"></script>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    .radar-ring { fill: none; stroke: var(--color-neutral-100); stroke-width: 1; }
    .radar-axis { stroke: var(--color-neutral-200); stroke-width: 1; }
    .radar-area { fill: rgba(99,102,241,0.15); stroke: var(--color-primary-500); stroke-width: 2; }
    .radar-dot  { fill: var(--color-primary-600); }
    .gr-row { border-bottom: 1px solid var(--color-border-subtle); }
    .gr-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside id="sidebar" class=""></aside>
  <main class="flex-1 flex flex-col overflow-hidden">

    <header class="page-header">
      <div>
        <h1 class="page-title">达成度分析</h1>
        <p class="page-subtitle">OBE四层达成度计算与可视化分析</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="version-select" onchange="loadAnalysis()" class="form-select" style="min-height:40px;padding-top:8px;padding-bottom:8px;min-width:220px">
          <option value="">选择培养方案版本</option>
        </select>
        <button id="btn-run" onclick="loadAnalysis()" class="btn btn-primary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          运行计算
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 page-enter">

      <!-- Empty -->
      <div id="empty-state" class="card">
        <div class="empty-state">
          <div class="empty-state-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </div>
          <p class="empty-state-title">选择培养方案后运行分析</p>
          <p class="empty-state-desc">系统将自动计算培养目标、毕业要求的完整达成度数据</p>
        </div>
      </div>

      <!-- Results -->
      <div id="results" class="hidden space-y-5">

        <!-- Summary cards -->
        <div id="summary-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

          <!-- Radar chart -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg>
                毕业要求雷达图</span>
            </div>
            <div class="card-body flex justify-center">
              <svg id="radar-svg" width="240" height="240" viewBox="0 0 240 240" aria-label="毕业要求达成度雷达图"></svg>
            </div>
          </div>

          <!-- Training objectives -->
          <div class="card lg:col-span-2">
            <div class="card-header">
              <span class="card-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                培养目标达成情况
              </span>
            </div>
            <div id="objectives-results" class="divide-y" style="border-top:1px solid var(--color-border-subtle)"></div>
          </div>
        </div>

        <!-- GR detail table -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              毕业要求达成明细
            </span>
            <div id="gr-summary-pills" class="flex items-center gap-2"></div>
          </div>
          <div class="overflow-x-auto">
            <table class="data-table" id="gr-table">
              <thead>
                <tr>
                  <th>毕业要求</th>
                  <th>描述</th>
                  <th class="text-center">指标点数</th>
                  <th class="text-center">达成度</th>
                  <th class="text-center">状态</th>
                  <th style="width:200px">达成进度</th>
                </tr>
              </thead>
              <tbody id="gr-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- Indicators detail -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-primary-500)"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              指标点达成明细</span>
            <span id="ind-note" class="text-xs" style="color:var(--color-neutral-400)">展开毕业要求查看各指标点详情</span>
          </div>
          <div id="ind-detail" class="divide-y" style="border-top:1px solid var(--color-border-subtle)"></div>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/analysis.js"></script>

</body>
</html>
